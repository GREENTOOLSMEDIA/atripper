<style>
  .pd-vynil-player{
    width: 100%;                    /* Cambiado: en vez de 1920px fijo */
    max-width: 1920px;              /* Opcional: límite máximo */
    height: 34px;
    display: flex;
    align-items: center;
    justify-content: center;        /* ← CENTRA TODO horizontalmente */
    gap: 12px;
    overflow: hidden;
    user-select: none;
    -webkit-user-select: none;
    font-family: Poppins, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
    margin: 0 auto;                 /* Por si está dentro de otro contenedor */
  }

  .pd-vynil-disc{
    width: 34px;
    height: 34px;
    display: grid;
    place-items: center;
    padding: 0;
    margin: 0;
    border: 0;
    background: transparent;
    cursor: pointer;
    flex: 0 0 auto;
  }

  .pd-vynil-disc img{
    width: 26px;
    height: 26px;
    display: block;
    transform-origin: 50% 50%;
  }

  .pd-vynil-player.is-playing .pd-vynil-disc img{
    animation: pdSpin 1.2s linear infinite;
  }

  @keyframes pdSpin{
    to{ transform: rotate(360deg); }
  }

  .pd-vynil-tracks {
    display: flex;
    align-items: center;
    gap: 10px;
    white-space: nowrap;
    overflow-x: auto;
    overflow-y: hidden;
    flex: 1 1 auto;
    min-width: 0;
    scrollbar-width: none;
    -ms-overflow-style: none;
    padding-bottom: 4px;
    /* Centrado adicional si el scroll no ocupa todo el ancho */
    justify-content: center;        /* ← Ayuda a centrar cuando hay poco contenido */
  }

  .pd-vynil-tracks::-webkit-scrollbar {
    display: none;
  }

  .pd-track{
    border: 0;
    background: transparent;
    padding: 0;
    margin: 0;
    font-size: 10px;
    line-height: 1;
    color: #ffffff;                    /* ← TEXTO EN BLANCO */
    cursor: pointer;
  }

  .pd-track:hover{
    text-decoration: underline;
    text-underline-offset: 3px;
  }

  .pd-track.is-active{
    font-weight: 600;
    text-decoration: underline;
    text-underline-offset: 3px;
  }

  .pd-sep{
    width: 1px;
    height: 16px;
    background: rgba(255,255,255,0.35);   /* ← Separador más visible en fondo oscuro */
    flex: 0 0 auto;
  }
</style>

<script>
  // (Tu script se mantiene igual, no necesita cambios)
  (function(){
    let el = document.currentScript;
    let root = null;
    while(el){
      el = el.previousElementSibling;
      if(el && el.classList && el.classList.contains('pd-vynil-player')){
        root = el;
        break;
      }
    }
    if(!root) root = document.querySelector('.pd-vynil-player');
    if(!root) return;

    const audio = root.querySelector('.pd-audio');
    const discBtn = root.querySelector('.pd-vynil-disc');
    const trackBtns = Array.from(root.querySelectorAll('.pd-track'));
    let currentSrc = '';
    let lastChosen = null;

    function setPlayingUI(on){ root.classList.toggle('is-playing', !!on); }
    function setActive(btn){
      trackBtns.forEach(b => b.classList.toggle('is-active', b === btn));
      if(btn) lastChosen = btn;
    }

    async function playSrc(src, btn){
      if(!src) return;
      if(currentSrc !== src){
        audio.pause();
        audio.currentTime = 0;
        audio.src = src;
        audio.load();
        currentSrc = src;
      }
      try{
        await audio.play();
        setActive(btn);
        setPlayingUI(true);
      }catch(e){
        setPlayingUI(false);
      }
    }

    function toggle(){
      if(!audio.src){
        const first = trackBtns[0];
        return playSrc(first?.dataset?.src || '', first);
      }
      if(audio.paused) return playSrc(audio.src, lastChosen || trackBtns.find(b => b.dataset.src === currentSrc) || trackBtns[0]);
      audio.pause();
      setPlayingUI(false);
    }

    trackBtns.forEach(btn => btn.addEventListener('click', ()=> playSrc(btn.dataset.src, btn)));
    discBtn.addEventListener('click', toggle);
    audio.addEventListener('pause', ()=> setPlayingUI(false));
    audio.addEventListener('ended', ()=> setPlayingUI(false));
    audio.addEventListener('play', ()=> setPlayingUI(true));
  })();
</script>
